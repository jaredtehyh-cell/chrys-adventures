kind = "web"
previewPath = "/"
title = "Chrys's Adventures"
version = "1.0.0"
id = "artifacts/chrys-adventures"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21818

[services.development]
run = "pnpm --filter @workspace/chrys-adventures run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chrys-adventures", "run", "build" ]
publicDir = "artifacts/chrys-adventures/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21818"
BASE_PATH = "/"
